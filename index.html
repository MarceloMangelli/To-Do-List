<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="container">
        <h1>
        To-Do List<span class="dots"></span>
        </h1>
        <form>
            <input type="text" class="input-button" id="inputBtn" placeholder="Nova tarefa...">
            <button class="add-button" id="addBtn">To Add</button>
            <button class="delete-all-button" id="delAllBtn">Delete all</button>
        </form>
        <ul class="list" id="list">
        </ul>
    </div>

    <footer>
        <h1>© 2026 Marcelo <a href="https://github.com/MarceloMangelli">github</a></h1>
    </footer>
    
    <script src="src/js/script.js"></script>
</body>
</html>
